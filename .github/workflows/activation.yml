name: Acquire Unity activation file

# Workflow manuel : produit un fichier .alf a deposer sur
# https://license.unity3d.com/manual pour obtenir le .ulf (secret UNITY_LICENSE).
# A supprimer une fois la licence configuree.
on:
  workflow_dispatch: {}

jobs:
  activation:
    name: Request activation file
    runs-on: ubuntu-latest
    steps:
      - name: Request manual activation file
        id: getManualLicenseFile
        uses: game-ci/unity-request-activation-file@v2
        with:
          unityVersion: 6000.2.9f1

      - name: Upload activation file
        uses: actions/upload-artifact@v4
        with:
          name: Manual Activation File
          path: ${{ steps.getManualLicenseFile.outputs.filePath }}
          retention-days: 3
