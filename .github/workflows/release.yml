name: Release

# Build + Release GitHub quand un tag vX.Y.Z est pousse.
on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    name: Build & Release (Windows64)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Cache Library
        uses: actions/cache@v4
        with:
          path: Library
          key: Library-${{ hashFiles('Assets/**', 'Packages/**', 'ProjectSettings/**') }}
          restore-keys: |
            Library-

      - name: Build Windows64
        uses: game-ci/unity-builder@v4
        env:
          UNITY_LICENSE: ${{ secrets.UNITY_LICENSE }}
          UNITY_EMAIL: ${{ secrets.UNITY_EMAIL }}
          UNITY_PASSWORD: ${{ secrets.UNITY_PASSWORD }}
        with:
          unityVersion: 6000.2.9f1
          targetPlatform: StandaloneWindows64

      - name: Zip build
        run: |
          cd build
          zip -r "../Survivors-Honor-${{ github.ref_name }}-Windows64.zip" StandaloneWindows64

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: Survivor's Honor ${{ github.ref_name }}
          files: Survivors-Honor-${{ github.ref_name }}-Windows64.zip
          generate_release_notes: true
