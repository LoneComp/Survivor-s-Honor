name: Activate Unity License (TOTP)

# EXPERIMENTAL : active une licence Unity Personal pour un compte avec 2FA,
# via unity-license-activate (login navigateur headless + code TOTP).
# Lance manuellement. Si ca marche : telecharge l'artifact .ulf et mets-le
# dans le secret UNITY_LICENSE. Si echec : voir l'artifact activation-error (error.png).
on:
  workflow_dispatch: {}

jobs:
  activate:
    name: Activate license via TOTP
    runs-on: ubuntu-latest
    steps:
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install unity-license-activate
        run: npm install --global unity-license-activate

      - name: Generate manual activation file (.alf)
        run: |
          docker run --rm \
            --volume "${{ github.workspace }}:/root/project" \
            --workdir /root/project \
            unityci/editor:ubuntu-6000.2.9f1-base-3 \
            unity-editor -batchmode -nographics -logFile /dev/stdout -createManualActivationFile -quit || true
          echo "--- Recherche du .alf ---"
          find . -maxdepth 3 -name "*.alf" -print

      - name: Activate license (2FA / TOTP)
        run: |
          ALF=$(find . -maxdepth 3 -name "*.alf" | head -n1)
          echo "ALF trouve: $ALF"
          if [ -z "$ALF" ]; then echo "Aucun .alf genere"; exit 1; fi
          unity-license-activate \
            "${{ secrets.UNITY_EMAIL }}" \
            "${{ secrets.UNITY_PASSWORD }}" \
            "$ALF" \
            --authenticator-key "${{ secrets.UNITY_TOTP_KEY }}"
          echo "--- Recherche du .ulf ---"
          find . -maxdepth 3 -name "*.ulf" -print

      - name: Upload .ulf (success)
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: unity-license-ulf
          path: '**/*.ulf'
          if-no-files-found: warn

      - name: Upload error screenshot (failure)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: activation-error
          path: |
            error.png
            **/error.png
          if-no-files-found: ignore
